<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>條碼掃描系統 — 版本入口</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      color: #1f2937;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: #1a56db;
      color: #fff;
      padding: 24px 20px 20px;
      text-align: center;
    }
    header h1 { font-size: 1.4rem; margin-bottom: 6px; }
    header p  { font-size: .88rem; opacity: .85; }

    /* ── 說明橫幅 ── */
    .banner {
      background: #eff6ff;
      border-left: 4px solid #1a56db;
      padding: 12px 20px;
      font-size: .85rem;
      color: #1e40af;
      max-width: 860px;
      margin: 18px auto 0;
      border-radius: 0 8px 8px 0;
    }

    /* ── 版本卡片 ── */
    main {
      max-width: 860px;
      margin: 20px auto;
      padding: 0 16px 40px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 1px 6px rgba(0,0,0,.1);
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 16px;
      align-items: start;
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.14); }

    /* 版本標籤 */
    .version-badge {
      width: 52px;
      height: 52px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .status-live     .version-badge { background: #d1fae5; color: #065f46; }
    .status-wip      .version-badge { background: #fef3c7; color: #92400e; }
    .status-planned  .version-badge { background: #f3f4f6; color: #6b7280; }

    /* 內容區 */
    .card-body {}
    .card-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; flex-wrap: wrap; }
    .card-title  { font-size: 1.05rem; font-weight: bold; }

    /* 狀態標籤 */
    .status-pill {
      padding: 2px 10px;
      border-radius: 99px;
      font-size: .72rem;
      font-weight: bold;
      letter-spacing: .04em;
    }
    .status-live    .status-pill { background: #d1fae5; color: #065f46; }
    .status-wip     .status-pill { background: #fef3c7; color: #92400e; }
    .status-planned .status-pill { background: #f3f4f6; color: #9ca3af; }

    .card-desc { font-size: .88rem; color: #4b5563; margin-bottom: 10px; line-height: 1.5; }

    /* 技術棧 */
    .stack { display: flex; gap: 6px; flex-wrap: wrap; }
    .stack-pill {
      padding: 2px 8px;
      background: #eff6ff;
      color: #1d4ed8;
      border-radius: 4px;
      font-size: .72rem;
      font-family: monospace;
    }

    .card-note {
      margin-top: 8px;
      font-size: .78rem;
      color: #9ca3af;
    }

    /* 按鈕 */
    .card-actions { display: flex; flex-direction: column; gap: 8px; align-items: flex-end; flex-shrink: 0; }
    .btn-open {
      padding: 9px 20px;
      background: #1a56db;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: .9rem;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      text-align: center;
      white-space: nowrap;
      transition: opacity .15s;
    }
    .btn-open:hover { opacity: .85; }
    .btn-open.disabled {
      background: #e5e7eb;
      color: #9ca3af;
      cursor: default;
      pointer-events: none;
    }
    .btn-github {
      font-size: .75rem;
      color: #6b7280;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .btn-github:hover { color: #1a56db; }

    /* ── 分隔線 ── */
    .section-label {
      font-size: .75rem;
      font-weight: bold;
      color: #9ca3af;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-top: 8px;
    }

    /* ── 底部 ── */
    footer {
      text-align: center;
      font-size: .78rem;
      color: #9ca3af;
      padding-bottom: 24px;
    }

    @media (max-width: 540px) {
      .card { grid-template-columns: auto 1fr; }
      .card-actions { grid-column: 1 / -1; flex-direction: row; }
    }
  </style>
</head>
<body>

<header>
  <h1>條碼掃描出貨記錄系統</h1>
  <p>各版本入口 — 版本越新規則越完整</p>
</header>

<main>
  <div id="versions-container">
    <!-- 動態產生 -->
    <p style="color:#9ca3af;text-align:center;padding:20px;">載入中…</p>
  </div>
  <footer>
    規格文件：
    <a href="specs/business-rules.md" target="_blank">商業規則</a> ／
    <a href="specs/ui-rules.md" target="_blank">UI 規則</a> ／
    <a href="specs/data-schema.md" target="_blank">資料結構</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/Hsieh583/Barcode-Excel-Counter" target="_blank">GitHub</a>
  </footer>
</main>

<script>
const STATUS_LABEL = {
  live:    '✅ 運行中',
  wip:     '🚧 開發中',
  planned: '🔲 規劃中',
};

async function loadVersions() {
  let versions;
  try {
    const res = await fetch('versions.json?_=' + Date.now());
    versions = await res.json();
  } catch {
    document.getElementById('versions-container').innerHTML =
      '<p style="color:#ef4444;text-align:center;">無法載入 versions.json</p>';
    return;
  }

  const live    = versions.filter(v => v.status === 'live');
  const wip     = versions.filter(v => v.status === 'wip');
  const planned = versions.filter(v => v.status === 'planned');

  const container = document.getElementById('versions-container');
  container.innerHTML = '';

  const sections = [
    { label: '運行中',  items: live },
    { label: '開發中',  items: wip  },
    { label: '規劃中',  items: planned },
  ];

  sections.forEach(({ label, items }) => {
    if (!items.length) return;

    const sec = document.createElement('div');
    sec.className = 'section-label';
    sec.textContent = label;
    container.appendChild(sec);

    items.forEach(v => {
      const url = v.deployedUrl || v.url;
      const hasUrl = Boolean(url);

      const card = document.createElement('div');
      card.className = `card status-${v.status}`;
      card.innerHTML = `
        <div class="version-badge">${v.version}</div>
        <div class="card-body">
          <div class="card-header">
            <span class="card-title">${v.title}</span>
            <span class="status-pill">${STATUS_LABEL[v.status] ?? v.status}</span>
          </div>
          <div class="card-desc">${v.description}</div>
          <div class="stack">
            ${v.stack.map(s => `<span class="stack-pill">${s}</span>`).join('')}
          </div>
          ${v.note ? `<div class="card-note">${v.note}</div>` : ''}
          ${v.deployedUrl ? `<div class="card-note">🌐 部署網址：<a href="${v.deployedUrl}" target="_blank">${v.deployedUrl}</a></div>` : ''}
        </div>
        <div class="card-actions">
          <a href="${hasUrl ? url : '#'}"
             target="${hasUrl ? '_blank' : ''}"
             class="btn-open ${hasUrl ? '' : 'disabled'}">
            ${hasUrl ? '開啟' : '尚未部署'}
          </a>
          <a class="btn-github"
             href="https://github.com/Hsieh583/Barcode-Excel-Counter/tree/main/versions/${v.id}"
             target="_blank">
            📁 原始碼
          </a>
        </div>
      `;
      container.appendChild(card);
    });
  });
}

loadVersions();
</script>

</body>
</html>
